<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفصيلي الموظفين | قسم الاستشارات - د. مروة منصور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0a1420; --panel:#101c2c; --panel-2:#152238; --line:#22334a;
    --teal:#3ddbd9; --amber:#e8b75c; --rose:#d9707a; --slate:#6b7a8d; --gold:#ffd166;
    --text:#eaf1f5; --text-dim:#93a4b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(1200px 600px at 80% -10%, #10233366, transparent), var(--bg);
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .wrap{max-width:960px; margin:0 auto;}

  header{
    position:relative;
    padding:26px 28px;
    border-radius:18px;
    background:linear-gradient(135deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    overflow:hidden;
    margin-bottom:20px;
  }
  .eyebrow{
    font-family:'Cairo', sans-serif; font-size:12px; letter-spacing:.5px;
    color:var(--teal); font-weight:700; margin-bottom:6px;
  }
  h1{ font-family:'Cairo', sans-serif; font-size:24px; font-weight:800; margin:0 0 4px; }
  header p{ margin:0; color:var(--text-dim); font-size:14px; }

  .back-row{ margin-bottom:20px; }
  .back-link{
    text-decoration:none; display:inline-block;
    font-family:'Cairo',sans-serif; font-weight:700; font-size:14px;
    padding:10px 18px; border-radius:10px;
    background:transparent; color:var(--text-dim); border:1px solid var(--line);
  }
  .back-link:hover{ color:var(--text); border-color:var(--teal); }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:22px; margin-bottom:20px;
  }
  .card h2{
    font-family:'Cairo', sans-serif; font-size:16px; font-weight:700; margin:0 0 16px;
    color:var(--text); display:flex; align-items:center; gap:8px;
  }
  .card h2::before{ content:""; width:4px; height:16px; background:var(--teal); border-radius:2px; display:inline-block; }

  .hero{ display:flex; align-items:center; gap:28px; flex-wrap:wrap; justify-content:center; }
  .donut-wrap{ position:relative; width:200px; height:200px; flex-shrink:0; }
  .donut-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .donut-center .pct{ font-family:'Cairo', sans-serif; font-size:34px; font-weight:800; color:var(--teal); line-height:1; }
  .donut-center .lbl{ font-size:11px; color:var(--text-dim); margin-top:4px; text-align:center; max-width:120px; }
  .stats{ display:grid; gap:10px; flex:1; min-width:220px; }
  .stat-row{ display:flex; align-items:center; justify-content:space-between; background:var(--panel-2); border-radius:10px; padding:10px 14px; }
  .stat-row .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; margin-inline-end:8px; }
  .dot-pos{ background:var(--amber); } .dot-neg{ background:var(--rose); } .dot-na{ background:var(--slate); }
  .stat-row .name{ font-size:14px; color:var(--text-dim); display:flex; align-items:center; }
  .stat-row .val{ font-family:'Cairo', sans-serif; font-weight:700; font-size:16px; }

  .emp-detail-card{
    background:var(--panel-2); border-radius:14px; padding:18px; margin-bottom:16px;
  }
  .emp-detail-card.top-performer{ border:1px solid var(--gold); }
  .emp-detail-head{ display:flex; align-items:center; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
  .emp-detail-donut-wrap{ position:relative; width:110px; height:110px; flex-shrink:0; }
  .emp-detail-donut-center{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Cairo',sans-serif; font-weight:800; font-size:19px; color:var(--teal); }
  .emp-detail-info{ flex:1; min-width:150px; }
  .emp-detail-name{ font-family:'Cairo', sans-serif; font-weight:800; font-size:17px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .emp-detail-counts span{ font-weight:700; }
  .emp-detail-counts{ font-size:14px; color:var(--text-dim); }
  .no-data-msg{ color:var(--text-dim); font-size:13px; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th, td{ padding:9px 8px; text-align:center; border-bottom:1px solid var(--line); }
  th{ color:var(--text-dim); font-weight:500; font-size:11px; }
  td.period-cell{ text-align:start; color:var(--text); font-weight:500; }
  .rate-badge{ font-family:'Cairo', sans-serif; font-weight:700; padding:3px 10px; border-radius:20px; font-size:12px; }
  .rate-high{ background:#3ddbd91f; color:var(--teal); }
  .rate-mid{ background:#e8b75c1f; color:var(--amber); }
  .rate-low{ background:#d9707a1f; color:var(--rose); }

  .empty{ text-align:center; padding:30px 10px; color:var(--text-dim); font-size:14px; }

  footer{ text-align:center; color:var(--text-dim); font-size:12px; margin-top:20px; }

  @media (max-width:520px){
    header{padding:20px;} h1{font-size:19px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">قسم الاستشارات الدوائية</div>
    <h1>تفصيلي الموظفين</h1>
    <p>د. مروة منصور — مشرف قسم الاستشارات والتدريب</p>
  </header>

  <div class="back-row">
    <a href="index.html" class="back-link">→ رجوع للصفحة الرئيسية</a>
  </div>

  <div class="card">
    <h2>إجمالي القسم</h2>
    <div id="deptArea"></div>
  </div>

  <div id="employeesArea"></div>

  <footer>
    البيانات محفوظة في متصفحك على هذا الجهاز فقط
    <div style="margin-top:6px; color:var(--text-dim);">Powered by: Dr Marwa Mansour</div>
  </footer>
</div>

<script>
const EMP_KEY = 'cr_employees';
const REC_KEY = 'cr_records_v2';

let employees = [];
let records = [];
let deptChart = null;
let empCharts = [];

function loadData(){
  try{ employees = JSON.parse(localStorage.getItem(EMP_KEY) || '[]'); }catch(e){ employees = []; }
  try{ records = JSON.parse(localStorage.getItem(REC_KEY) || '[]'); }catch(e){ records = []; }
}

function getPeriodsSorted(){ return [...new Set(records.map(r => r.key))].sort((a,b) => a.localeCompare(b)); }
function recordsForPeriod(key){ return records.filter(r => r.key === key); }
function aggregateForPeriod(key){
  const recs = recordsForPeriod(key);
  const agg = { pos:0, neg:0, na:0, total:0, employeeRecords: recs };
  recs.forEach(r => { agg.pos += r.pos; agg.neg += r.neg; agg.na += r.na; agg.total += r.total; });
  return agg;
}
function conversionRate(agg){
  const responded = agg.pos + agg.neg;
  if(responded === 0) return null;
  return (agg.pos / responded) * 100;
}
function rateBadgeClass(rate){
  if(rate === null) return 'rate-low';
  if(rate >= 70) return 'rate-high';
  if(rate >= 40) return 'rate-mid';
  return 'rate-low';
}
function employeeExists(id){ return employees.some(e => e.id === id); }

function renderDept(){
  const area = document.getElementById('deptArea');
  const periods = getPeriodsSorted();
  if(periods.length === 0){
    area.innerHTML = '<div class="empty">لسه مفيش بيانات مسجّلة.</div>';
    return;
  }
  const latest = periods[periods.length - 1];
  const agg = aggregateForPeriod(latest);
  const rate = conversionRate(agg);
  const rateDisplay = rate === null ? '—' : rate.toFixed(1) + '%';
  const label = agg.employeeRecords[0] ? agg.employeeRecords[0].label : latest;

  area.innerHTML = `
    <div style="color:var(--text-dim); font-size:13px; margin-bottom:14px;">فترة: ${label}</div>
    <div class="hero">
      <div class="donut-wrap">
        <canvas id="deptDonut" width="200" height="200"></canvas>
        <div class="donut-center">
          <div class="pct">${rateDisplay}</div>
          <div class="lbl">معدل تحويل القسم</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat-row"><span class="name"><span class="dot dot-pos"></span>إيجابي</span><span class="val" style="color:var(--amber)">${agg.pos}</span></div>
        <div class="stat-row"><span class="name"><span class="dot dot-neg"></span>سلبي</span><span class="val" style="color:var(--rose)">${agg.neg}</span></div>
        <div class="stat-row"><span class="name"><span class="dot dot-na"></span>لم يرد</span><span class="val" style="color:var(--slate)">${agg.na}</span></div>
        <div class="stat-row" style="border:1px solid var(--line);"><span class="name">إجمالي مكالمات القسم</span><span class="val">${agg.total}</span></div>
      </div>
    </div>
  `;

  const ctx = document.getElementById('deptDonut').getContext('2d');
  if(deptChart) deptChart.destroy();
  deptChart = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:['إيجابي','سلبي','لم يرد'], datasets:[{ data:[agg.pos, agg.neg, agg.na], backgroundColor:['#e8b75c','#d9707a','#6b7a8d'], borderColor:'#101c2c', borderWidth:3 }] },
    options:{ cutout:'72%', plugins:{ legend:{display:false} } }
  });
}

function renderEmployees(){
  const area = document.getElementById('employeesArea');
  empCharts.forEach(c => c.destroy());
  empCharts = [];

  const periods = getPeriodsSorted();
  const latest = periods.length ? periods[periods.length - 1] : null;

  // list every employee who has at least one record, plus all currently-active employees
  const idsWithRecords = [...new Set(records.map(r => r.employeeId))];
  const allIds = [...new Set([...employees.map(e => e.id), ...idsWithRecords])];

  if(allIds.length === 0){
    area.innerHTML = '<div class="card"><div class="empty">لسه مفيش موظفين أو بيانات.</div></div>';
    return;
  }

  // rank by current-period rate to award the crown
  let bestRate = null;
  if(latest){
    const currentRates = allIds.map(id => {
      const rec = records.find(r => r.key === latest && r.employeeId === id);
      return rec ? conversionRate(rec) : null;
    }).filter(r => r !== null);
    if(currentRates.length > 1) bestRate = Math.max(...currentRates);
  }

  area.innerHTML = allIds.map(id => {
    const name = employeeExists(id) ? employees.find(e => e.id === id).name : (records.find(r=>r.employeeId===id)?.employeeName || 'موظف محذوف');
    const deleted = !employeeExists(id);
    const currentRec = latest ? records.find(r => r.key === latest && r.employeeId === id) : null;
    const currentRate = currentRec ? conversionRate(currentRec) : null;
    const isTop = bestRate !== null && currentRate === bestRate;

    const history = records.filter(r => r.employeeId === id).sort((a,b) => b.key.localeCompare(a.key));

    const currentBlock = currentRec ? `
      <div class="emp-detail-head">
        <div class="emp-detail-donut-wrap">
          <canvas id="donut_${id}" width="110" height="110"></canvas>
          <div class="emp-detail-donut-center">${currentRate === null ? '—' : currentRate.toFixed(1) + '%'}</div>
        </div>
        <div class="emp-detail-info">
          <div class="emp-detail-name">${name}${deleted ? '<span style="color:var(--rose); font-size:11px;">(محذوف)</span>' : ''}${isTop ? ' 🏆' : ''}</div>
          <div class="emp-detail-counts">
            <span style="color:var(--amber)">${currentRec.pos} إيجابي</span> ·
            <span style="color:var(--rose)">${currentRec.neg} سلبي</span> ·
            <span style="color:var(--slate)">${currentRec.na} لم يرد</span> ·
            إجمالي ${currentRec.total}
          </div>
        </div>
      </div>
    ` : `
      <div class="emp-detail-head">
        <div class="emp-detail-info">
          <div class="emp-detail-name">${name}${deleted ? '<span style="color:var(--rose); font-size:11px;">(محذوف)</span>' : ''}</div>
          <div class="no-data-msg">لسه مفيش بيانات للفترة الحالية</div>
        </div>
      </div>
    `;

    const historyRows = history.length ? history.map(r => {
      const rate = conversionRate(r);
      const rateDisplay = rate === null ? '—' : rate.toFixed(1) + '%';
      return `
        <tr>
          <td class="period-cell">${r.label}</td>
          <td>${r.total}</td>
          <td style="color:var(--amber)">${r.pos}</td>
          <td style="color:var(--rose)">${r.neg}</td>
          <td style="color:var(--slate)">${r.na}</td>
          <td><span class="rate-badge ${rateBadgeClass(rate)}">${rateDisplay}</span></td>
        </tr>
      `;
    }).join('') : `<tr><td colspan="6" class="no-data-msg">لسه مفيش سجل شهور سابقة</td></tr>`;

    return `
      <div class="card">
        <div class="emp-detail-card ${isTop ? 'top-performer' : ''}">
          ${currentBlock}
        </div>
        <h2 style="margin-top:6px;">سجل الشهور</h2>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>الفترة</th><th>إجمالي</th><th>إيجابي</th><th>سلبي</th><th>لم يرد</th><th>المعدل</th></tr></thead>
            <tbody>${historyRows}</tbody>
          </table>
        </div>
      </div>
    `;
  }).join('');

  allIds.forEach(id => {
    const canvas = document.getElementById('donut_' + id);
    if(!canvas) return;
    const rec = records.find(r => r.key === latest && r.employeeId === id);
    if(!rec) return;
    const c = new Chart(canvas.getContext('2d'), {
      type:'doughnut',
      data:{ datasets:[{ data:[rec.pos, rec.neg, rec.na], backgroundColor:['#e8b75c','#d9707a','#6b7a8d'], borderColor:'#152238', borderWidth:2 }] },
      options:{ cutout:'70%', plugins:{ legend:{display:false}, tooltip:{enabled:false} } }
    });
    empCharts.push(c);
  });
}

loadData();
renderDept();
renderEmployees();
</script>
</body>
</html>
